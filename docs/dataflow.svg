<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="340" rx="12" fill="url(#bg)"/>
  <text x="450" y="32" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">网关数据流</text>

  <!-- 步骤1: 隧道连接 -->
  <g>
    <rect x="30" y="60" width="160" height="70" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="88" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">1. 隧道连接</text>
    <text x="110" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">边缘端 → WSS :9000</text>
  </g>

  <!-- 步骤2: 注册 -->
  <g>
    <rect x="220" y="60" width="160" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="300" y="88" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">2. 注册上线</text>
    <text x="300" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">连接池 + 心跳</text>
  </g>

  <!-- 步骤3: 域名绑定 -->
  <g>
    <rect x="410" y="60" width="160" height="70" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1"/>
    <text x="490" y="88" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">3. 域名绑定</text>
    <text x="490" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">Django → 控制面</text>
  </g>

  <!-- 步骤4: RDP连接 -->
  <g>
    <rect x="600" y="60" width="160" height="70" rx="8" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
    <text x="680" y="88" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">4. RDP连接</text>
    <text x="680" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">客户端 → TLS :443</text>
  </g>

  <!-- 步骤间箭头 -->
  <line x1="190" y1="95" x2="218" y2="95" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="380" y1="95" x2="408" y2="95" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="570" y1="95" x2="598" y2="95" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- 详细数据流 -->
  <g>
    <rect x="30" y="160" width="840" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="450" y="185" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">RDP会话数据流</text>

    <rect x="60" y="210" width="100" height="50" rx="6" fill="#78350f"/>
    <text x="110" y="240" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">RDP客户端</text>

    <rect x="210" y="210" width="100" height="50" rx="6" fill="#1e3a5f"/>
    <text x="260" y="235" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">TLS :443</text>
    <text x="260" y="250" text-anchor="middle" fill="#64748b" font-size="8">SNI提取</text>

    <rect x="360" y="210" width="100" height="50" rx="6" fill="#1e3a5f"/>
    <text x="410" y="235" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">路由器</text>
    <text x="410" y="250" text-anchor="middle" fill="#64748b" font-size="8">域名→Token</text>

    <rect x="510" y="210" width="100" height="50" rx="6" fill="#065f46"/>
    <text x="560" y="235" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">WSS帧</text>
    <text x="560" y="250" text-anchor="middle" fill="#64748b" font-size="8">RDP通道</text>

    <rect x="660" y="210" width="100" height="50" rx="6" fill="#065f46"/>
    <text x="710" y="235" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">边缘代理</text>
    <text x="710" y="250" text-anchor="middle" fill="#64748b" font-size="8">→ 本地端口</text>

    <rect x="810" y="210" width="50" height="50" rx="6" fill="#334155"/>
    <text x="835" y="240" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">RDP</text>

    <line x1="160" y1="235" x2="208" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="310" y1="235" x2="358" y2="235" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrB)"/>
    <line x1="460" y1="235" x2="508" y2="235" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrB)"/>
    <line x1="610" y1="235" x2="658" y2="235" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrG)"/>
    <line x1="760" y1="235" x2="808" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

    <path d="M835,265 L835,290 L110,290 L110,265" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
    <text x="470" y="305" text-anchor="middle" fill="#64748b" font-size="9">← 响应数据（原路返回） →</text>
  </g>
</svg>
